<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Connect Four AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
</head>
<body>
    <div class="container">
        <h1>CONNECT FOUR</h1>
        
        <div class="game-info">
            <div id="player-info">Player vs AI</div>
            <div id="turn-info">Your turn</div>
        </div>

        <div class="board" id="board">
            <!-- Board cells will be generated by JavaScript -->
        </div>

        <div class="controls">
            <button id="new-game-btn" class="btn">New Game</button>
            <button id="order-btn" class="btn">Go Second</button>
        </div>

        <div class="column-buttons" id="column-buttons">
            <!-- Column buttons will be generated by JavaScript -->
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading AI...</div>
    </div>

    <script src="connect4_clean.js"></script>
    <script src="game_clean.js"></script>
</body>
</html>
